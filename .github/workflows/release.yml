name: Release

# Triggered ONLY when you publish a GitHub Release. Creating a Release in the
# GitHub UI (or via `gh release create vX.Y.Z`) creates the tag for you and
# fires this workflow once. Do NOT also listen for `push: tags` — that would
# cause two workflow runs to race for the same publish, and the second one
# always fails with "cannot publish over previously published versions."
on:
  release:
    types: [published]

# Provenance attestation requires write permissions on id-token; contents
# read is enough for actions/checkout.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, test, and publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Pin to LTS for publishing. The matrix is for CI; releases are
          # one canonical environment.
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        # Guards against the release-time mistake of tagging v0.4.0 while
        # package.json still says 0.3.0. Fails fast before we waste time
        # on the build. GITHUB_REF_NAME is the release's tag name for
        # release:published events (e.g. "v0.3.1").
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      # Re-run the full CI pipeline before publishing. Belt and suspenders:
      # the branch CI should already have passed, but tags can be cut from
      # any commit, including ones that bypassed branch protection.
      - name: Full CI (lint, typecheck, build, test)
        run: npm run ci

      - name: Publish to npm
        # --provenance adds supply-chain attestation. Requires id-token: write
        # (granted above) and a public npm package.
        # --access public is required for scoped packages on the free plan;
        # harmless for unscoped packages like this one.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
