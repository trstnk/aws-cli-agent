name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch/PR.
# Cheaper than letting the old run finish on a branch that's already moved on.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against the minimum supported Node (declared in package.json
        # engines) and the current LTS. Adding more rarely catches more bugs
        # and burns CI minutes.
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # `npm ci` requires package-lock.json. If you haven't committed one
        # yet, switch to `npm install --no-audit --no-fund` for the first run.
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm test
