version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Group related updates into a single PR. Without grouping, dependabot
    # opens one PR per dependency, which becomes noise fast for a project
    # with this many transitive deps.
    groups:
      ai-sdk:
        # All Vercel AI SDK provider packages move together; treating them
        # as a single update saves a lot of review time.
        patterns:
          - '@ai-sdk/*'
          - 'ai'
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
      dev-dependencies:
        dependency-type: development
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
